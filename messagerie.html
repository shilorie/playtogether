<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#1a1a18"/>
  <title>PlayTogether – Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3ee;
      --dark: #1a1a18;
      --accent: #e8ff47;
      --accent2: #ff5c3a;
      --gray: #7a7a70;
      --border: rgba(255,255,255,0.08);
      --bubble-me: #e8ff47;
      --bubble-them: rgba(255,255,255,0.08);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: #fff;
      height: 100vh; height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── VIEWS ── */
    .view { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
    .view.active { display: flex; }

    /* ════════════════════════════
       LISTE DES CONVERSATIONS
    ════════════════════════════ */
    #viewList {}

    .list-header {
      padding: calc(16px + var(--safe-top)) 20px 14px;
      background: rgba(26,26,24,0.97);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .list-header-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .list-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
    }
    .header-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: #fff; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* Matches récents (avatars en haut) */
    .recent-matches {
      display: flex; gap: 16px; overflow-x: auto;
      padding-bottom: 4px; scrollbar-width: none;
    }
    .recent-matches::-webkit-scrollbar { display: none; }
    .recent-match {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .recent-avatar-wrap { position: relative; }
    .recent-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; border: 2.5px solid transparent;
      transition: transform 0.2s;
    }
    .recent-avatar.new { border-color: var(--accent2); }
    .recent-avatar:active { transform: scale(0.93); }
    .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #4ade80; border: 2px solid var(--dark);
    }
    .recent-name { font-size: 0.7rem; color: rgba(255,255,255,0.5); }

    /* Search bar */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 14px; margin: 14px 20px 0;
    }
    .search-bar input {
      background: none; border: none; color: #fff; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; flex: 1;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }

    /* Conversation list */
    .conv-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .conv-list::-webkit-scrollbar { display: none; }

    .conv-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px; cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .conv-item:active { background: rgba(255,255,255,0.04); }
    .conv-avatar {
      width: 54px; height: 54px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; flex-shrink: 0; position: relative;
    }
    .conv-online {
      position: absolute; bottom: 2px; right: 2px;
      width: 13px; height: 13px; border-radius: 50%;
      background: #4ade80; border: 2px solid var(--dark);
    }
    .conv-body { flex: 1; min-width: 0; }
    .conv-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .conv-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .conv-time { font-size: 0.72rem; color: rgba(255,255,255,0.35); }
    .conv-preview { font-size: 0.83rem; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview.unread { color: rgba(255,255,255,0.75); }
    .unread-badge {
      background: var(--accent2); color: #fff;
      width: 20px; height: 20px; border-radius: 50%;
      font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .conv-sport-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(232,255,71,0.08); color: var(--accent);
      padding: 2px 8px; border-radius: 100px; font-size: 0.68rem;
      margin-top: 4px;
    }

    /* Bottom nav */
    .bottom-nav {
      flex-shrink: 0;
      background: rgba(26,26,24,0.97);
      border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + var(--safe-bottom));
      display: flex; justify-content: space-around; align-items: center;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: 0.6rem; color: rgba(255,255,255,0.3); cursor: pointer;
      padding: 4px 16px; -webkit-tap-highlight-color: transparent;
    }
    .nav-item .nav-icon { font-size: 1.3rem; }
    .nav-item.active { color: var(--accent2); }

    /* ════════════════════════════
       CHAT VIEW
    ════════════════════════════ */
    #viewChat {}

    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: calc(14px + var(--safe-top)) 16px 14px;
      background: rgba(26,26,24,0.97);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; color: #fff;
      font-size: 1.3rem; cursor: pointer; padding: 4px 8px 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .chat-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; position: relative; flex-shrink: 0;
    }
    .chat-online {
      position: absolute; bottom: 1px; right: 1px;
      width: 11px; height: 11px; border-radius: 50%;
      background: #4ade80; border: 2px solid var(--dark);
    }
    .chat-header-info { flex: 1; }
    .chat-header-name {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
    }
    .chat-header-status { font-size: 0.72rem; color: #4ade80; margin-top: 1px; }
    .chat-header-actions { display: flex; gap: 8px; }
    .chat-action-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: #fff; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* Sport banner */
    .sport-banner {
      background: rgba(232,255,71,0.06);
      border-bottom: 1px solid rgba(232,255,71,0.12);
      padding: 8px 16px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: rgba(232,255,71,0.7);
      flex-shrink: 0;
    }

    /* Messages */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 16px 16px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .messages-area::-webkit-scrollbar { display: none; }

    .msg-day-sep {
      text-align: center; font-size: 0.72rem;
      color: rgba(255,255,255,0.25); margin: 12px 0;
    }

    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
      max-width: 85%;
    }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.theirs { align-self: flex-start; }

    .msg-avatar-sm {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0; margin-bottom: 2px;
    }
    .msg-row.mine .msg-avatar-sm { display: none; }

    .msg-bubble {
      padding: 10px 14px; border-radius: 20px;
      font-size: 0.9rem; line-height: 1.5;
      max-width: 100%;
    }
    .msg-row.mine .msg-bubble {
      background: var(--bubble-me); color: var(--dark);
      border-bottom-right-radius: 6px;
      font-weight: 500;
    }
    .msg-row.theirs .msg-bubble {
      background: var(--bubble-them);
      color: rgba(255,255,255,0.88);
      border-bottom-left-radius: 6px;
    }
    .msg-time {
      font-size: 0.65rem; color: rgba(255,255,255,0.25);
      margin-top: 4px; text-align: right;
      padding: 0 4px;
    }
    .msg-row.mine .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: none; align-self: flex-start;
      align-items: flex-end; gap: 8px;
    }
    .typing-indicator.show { display: flex; }
    .typing-bubble {
      background: var(--bubble-them);
      padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 6px;
      display: flex; gap: 4px; align-items: center;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: typingDot 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Suggestions rapides */
    .quick-replies {
      display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px 6px;
      scrollbar-width: none; flex-shrink: 0;
    }
    .quick-replies::-webkit-scrollbar { display: none; }
    .quick-reply {
      white-space: nowrap; padding: 7px 14px; border-radius: 100px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: rgba(255,255,255,0.6); font-size: 0.78rem; cursor: pointer;
      flex-shrink: 0; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .quick-reply:active { background: rgba(232,255,71,0.1); color: var(--accent); border-color: var(--accent); }

    /* Input bar */
    .input-bar {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 10px 16px calc(10px + var(--safe-bottom));
      background: rgba(26,26,24,0.97);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1.5px solid var(--border); border-radius: 22px;
      display: flex; align-items: flex-end; padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(232,255,71,0.4); }
    .msg-input {
      flex: 1; background: none; border: none; color: #fff; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      resize: none; max-height: 100px; line-height: 1.4;
    }
    .msg-input::placeholder { color: rgba(255,255,255,0.25); }
    .emoji-btn {
      background: none; border: none; font-size: 1.2rem;
      cursor: pointer; padding: 0 0 0 8px; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); border: none;
      color: var(--dark); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.3; }

    /* Plan session card */
    .session-card {
      background: rgba(232,255,71,0.07);
      border: 1px solid rgba(232,255,71,0.2);
      border-radius: 16px; padding: 14px 16px;
      margin: 8px 0; max-width: 260px;
    }
    .session-card-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.9rem; color: var(--accent); margin-bottom: 8px;
    }
    .session-card-detail {
      font-size: 0.8rem; color: rgba(255,255,255,0.6);
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .session-confirm-btn {
      background: var(--accent); color: var(--dark);
      border: none; padding: 8px 16px; border-radius: 100px;
      font-weight: 700; font-size: 0.78rem; cursor: pointer;
      margin-top: 10px; width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════
     VIEW 1 : LISTE
══════════════════════════ -->
<div class="view active" id="viewList">

  <div class="list-header">
    <div class="list-header-top">
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem">Messages</div>
      <div style="display:flex;gap:8px">
        <button class="header-btn">✏️</button>
        <button class="header-btn">⚙️</button>
      </div>
    </div>

    <!-- Matches récents -->
    <div class="recent-matches" id="recentMatches"></div>
  </div>

  <!-- Search -->
  <div class="search-bar" style="margin:14px 20px 0;flex-shrink:0">
    <span style="color:rgba(255,255,255,0.3)">🔍</span>
    <input type="text" placeholder="Rechercher une conversation…" oninput="filterConvs(this.value)"/>
  </div>

  <!-- Conversations -->
  <div class="conv-list" id="convList"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item"><span class="nav-icon">🏠</span><span>Accueil</span></div>
    <div class="nav-item"><span class="nav-icon">🔍</span><span>Explorer</span></div>
    <div class="nav-item"><span class="nav-icon">❤️</span><span>Matches</span></div>
    <div class="nav-item active"><span class="nav-icon">💬</span><span>Messages</span></div>
    <div class="nav-item"><span class="nav-icon">👤</span><span>Profil</span></div>
  </nav>
</div>

<!-- ══════════════════════════
     VIEW 2 : CHAT
══════════════════════════ -->
<div class="view" id="viewChat">

  <!-- Header -->
  <div class="chat-header">
    <button class="back-btn" onclick="showList()">←</button>
    <div class="chat-avatar" id="chatAvatar">
      <div class="chat-online"></div>
    </div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chatName">Lucas</div>
      <div class="chat-header-status" id="chatStatus">En ligne</div>
    </div>
    <div class="chat-header-actions">
      <button class="chat-action-btn">📅</button>
      <button class="chat-action-btn">⋯</button>
    </div>
  </div>

  <!-- Sport banner -->
  <div class="sport-banner" id="sportBanner">
    🏃 Running · Niveau intermédiaire · Disponible le weekend
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea"></div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea class="msg-input" id="msgInput" placeholder="Écris un message…" rows="1"
        oninput="autoResize(this); toggleSend()"
        onkeydown="handleKey(event)"></textarea>
      <button class="emoji-btn" onclick="addEmoji()">😊</button>
    </div>
    <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const contacts = [
  { id:1, name:'Lucas', age:27, photo:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=200&q=80', bg:'#1e2a1e', sport:'🏃 Running', level:'Intermédiaire', online:true, unread:2,
    lastMsg:'Tu es dispo demain matin ?', lastTime:'09:41',
    messages:[
      { mine:false, text:'Salut ! J\'ai vu ton profil, tu fais du running aussi ? 🏃', time:'Hier 18:22' },
      { mine:true,  text:'Oui ! Je cours 3x par semaine autour du lac 😄', time:'Hier 18:45' },
      { mine:false, text:'Super ! C\'est mon parcours préféré. Tu cours à quelle allure ?', time:'Hier 19:01' },
      { mine:true,  text:'Environ 5min/km. Et toi ?', time:'Hier 19:03' },
      { mine:false, text:'Pareil ! On devrait courir ensemble 🙌', time:'Hier 19:10' },
      { mine:false, text:'Tu es dispo demain matin ?', time:'09:41', unread:true },
    ],
    quickReplies:['Oui dispo 🙌','Pas demain…','À quelle heure ?','Super idée !'],
    sessionProp: { sport:'🏃 Running', date:'Demain 7h30', lieu:'Lac de Bordeaux', duree:'1h' }
  },
  { id:2, name:'Camille', age:24, photo:'https://images.unsplash.com/photo-1594381898411-846e7d193883?w=200&q=80', bg:'#1a1a2e', sport:'🎾 Padel', level:'Débutante', online:false, unread:0,
    lastMsg:'Super match hier !', lastTime:'Hier',
    messages:[
      { mine:false, text:'Hey ! Tu fais du padel aussi ? 🎾', time:'Lundi 14:00' },
      { mine:true,  text:'Oui je débute ! Tu joues depuis longtemps ?', time:'Lundi 14:15' },
      { mine:false, text:'6 mois seulement. On pourrait faire un match ?', time:'Lundi 14:20' },
      { mine:true,  text:'Avec plaisir ! Je connais un terrain à Mériadeck 😊', time:'Lundi 14:35' },
      { mine:false, text:'Super match hier !', time:'Hier 20:12' },
    ],
    quickReplies:['Merci c\'était top !','On refait ça ?','Quand es-tu dispo ?'],
    sessionProp: null
  },
  { id:3, name:'Maxime', age:31, photo:'https://images.unsplash.com/photo-1534367610401-9f5ed68180aa?w=200&q=80', bg:'#2a1a1a', sport:'💪 Muscu', level:'Avancé', online:true, unread:1,
    lastMsg:'La salle ouvre à 7h demain', lastTime:'10:23',
    messages:[
      { mine:false, text:'Salut ! Tu cherches un partenaire de muscu ?', time:'Lundi 09:00' },
      { mine:true,  text:'Oui ! Je vais à la salle 4x/semaine', time:'Lundi 09:15' },
      { mine:false, text:'Moving Bordeaux ?', time:'Lundi 09:20' },
      { mine:true,  text:'Oui exactement !', time:'Lundi 09:25' },
      { mine:false, text:'Moi aussi ! 💪', time:'Lundi 09:30' },
      { mine:false, text:'La salle ouvre à 7h demain', time:'10:23', unread:true },
    ],
    quickReplies:['Je serai là 💪','Parfait à demain !','Quel programme tu fais ?'],
    sessionProp: null
  },
  { id:4, name:'Sophie', age:29, photo:'https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?w=200&q=80', bg:'#1a2a2a', sport:'🥾 Rando', level:'Intermédiaire', online:false, unread:0,
    lastMsg:'La météo sera parfaite ce week-end !', lastTime:'Mar',
    messages:[
      { mine:false, text:'Tu fais de la rando autour de Bordeaux ?', time:'Dimanche 11:00' },
      { mine:true,  text:'Oui ! Médoc et Arcachon surtout 🌲', time:'Dimanche 11:20' },
      { mine:false, text:'Super sentier vers Lacanau à faire !', time:'Dimanche 11:45' },
      { mine:false, text:'La météo sera parfaite ce week-end !', time:'Mar 16:30' },
    ],
    quickReplies:['On y va ce weekend ? 🥾','Envoie le lien !','Super idée !'],
    sessionProp: null
  },
];

let currentContact = null;

// ── RENDER LIST ──
function renderList(filter = '') {
  const recentEl = document.getElementById('recentMatches');
  recentEl.innerHTML = '';
  contacts.forEach(c => {
    const div = document.createElement('div');
    div.className = 'recent-match';
    div.innerHTML = `
      <div class="recent-avatar-wrap">
        <div class="recent-avatar ${c.unread ? 'new' : ''}" style="background-image:url('${c.photo}');background-size:cover;background-position:center;background-color:${c.bg}" onclick="openChat(${c.id})"></div>
        ${c.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="recent-name">${c.name}</div>
    `;
    recentEl.appendChild(div);
  });

  const listEl = document.getElementById('convList');
  listEl.innerHTML = '';
  const filtered = contacts.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
  filtered.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item';
    div.onclick = () => openChat(c.id);
    div.innerHTML = `
      <div class="conv-avatar" style="background:${c.bg};overflow:hidden;background-image:url('${c.photo}');background-size:cover;background-position:center">
        ${c.online ? '<div class="conv-online"></div>' : ''}
      </div>
      <div class="conv-body">
        <div class="conv-top">
          <div class="conv-name">${c.name}, ${c.age}</div>
          <div class="conv-time">${c.lastTime}</div>
        </div>
        <div class="conv-preview ${c.unread ? 'unread' : ''}">${c.unread ? '💬 ' : ''}${c.lastMsg}</div>
        <div class="conv-sport-tag">${c.sport}</div>
      </div>
      ${c.unread ? `<div class="unread-badge">${c.unread}</div>` : ''}
    `;
    listEl.appendChild(div);
  });
}

function filterConvs(val) { renderList(val); }

// ── OPEN CHAT ──
function openChat(id) {
  currentContact = contacts.find(c => c.id === id);
  if (!currentContact) return;

  // Mark as read
  currentContact.unread = 0;
  renderList();

  // Fill header
  document.getElementById('chatAvatar').style.backgroundImage = 'url(' + currentContact.photo + ')';
  document.getElementById('chatAvatar').style.backgroundSize = 'cover';
  document.getElementById('chatAvatar').style.backgroundPosition = 'center';
  document.getElementById('chatAvatar').innerHTML = currentContact.online ? '<div class="chat-online"></div>' : '';
  document.getElementById('chatName').textContent = currentContact.name + ', ' + currentContact.age;
  document.getElementById('chatStatus').textContent = currentContact.online ? 'En ligne' : 'Vu récemment';
  document.getElementById('chatStatus').style.color = currentContact.online ? '#4ade80' : 'rgba(255,255,255,0.3)';
  document.getElementById('sportBanner').textContent = currentContact.sport + ' · Niveau ' + currentContact.level;

  // Render messages
  renderMessages();

  // Quick replies
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  currentContact.quickReplies.forEach(r => {
    const btn = document.createElement('div');
    btn.className = 'quick-reply';
    btn.textContent = r;
    btn.onclick = () => { document.getElementById('msgInput').value = r; toggleSend(); sendMessage(); };
    qr.appendChild(btn);
  });

  // Show chat view
  document.getElementById('viewList').classList.remove('active');
  document.getElementById('viewChat').classList.add('active');
  scrollToBottom();
}

function renderMessages() {
  const area = document.getElementById('messagesArea');
  area.innerHTML = '';

  // Day separator
  const sep = document.createElement('div');
  sep.className = 'msg-day-sep';
  sep.textContent = 'Hier';
  area.appendChild(sep);

  currentContact.messages.forEach(m => {
    // Session proposal card (first message if exists)
    if (m === currentContact.messages[0] && currentContact.sessionProp) {
      const sp = currentContact.sessionProp;
      const row = document.createElement('div');
      row.className = 'msg-row theirs';
      row.innerHTML = `
        <div class="msg-avatar-sm" style="background-image:url('${currentContact.photo}');background-size:cover;background-position:center"></div>
        <div>
          <div class="session-card">
            <div class="session-card-title">📅 Proposition de session</div>
            <div class="session-card-detail">🏃 ${sp.sport}</div>
            <div class="session-card-detail">🕐 ${sp.date}</div>
            <div class="session-card-detail">📍 ${sp.lieu}</div>
            <div class="session-card-detail">⏱️ ${sp.duree}</div>
            <button class="session-confirm-btn" onclick="confirmSession(this)">✅ Confirmer la session !</button>
          </div>
        </div>
      `;
      area.appendChild(row);
    }

    const row = document.createElement('div');
    row.className = 'msg-row ' + (m.mine ? 'mine' : 'theirs');
    row.innerHTML = `
      ${!m.mine ? `<div class="msg-avatar-sm" style="background-image:url('${currentContact.photo}');background-size:cover;background-position:center"></div>` : ''}
      <div>
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-time">${m.time}${m.mine ? ' ✓✓' : ''}</div>
      </div>
    `;
    area.appendChild(row);
  });

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.id = 'typingIndicator';
  typing.innerHTML = `
    <div class="msg-avatar-sm" style="background-image:url('${currentContact.photo}');background-size:cover;background-position:center"></div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  `;
  area.appendChild(typing);
}

function confirmSession(btn) {
  btn.textContent = '🎉 Session confirmée !';
  btn.style.background = '#4ade80';
  btn.disabled = true;
  // Add confirmation message
  currentContact.messages.push({ mine:true, text:'Super, c\'est noté ! À demain 7h30 au lac 🏃💨', time:'Maintenant' });
  renderMessages();
  scrollToBottom();
}

function showList() {
  document.getElementById('viewChat').classList.remove('active');
  document.getElementById('viewList').classList.add('active');
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  currentContact.messages.push({ mine:true, text, time:'Maintenant' });
  currentContact.lastMsg = text;
  currentContact.lastTime = 'Maintenant';
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  renderMessages();
  scrollToBottom();
  renderList();

  // Simulate reply
  const responses = [
    'Super ! 😄','Ça marche pour moi !','Parfait 🙌','Ah ouais bonne idée !',
    'Je serai là 💪','On se retrouve là-bas ?','Trop bien !','À très vite alors 🏃'
  ];
  setTimeout(() => {
    document.getElementById('typingIndicator') && document.getElementById('typingIndicator').classList.add('show');
    scrollToBottom();
    setTimeout(() => {
      const reply = responses[Math.floor(Math.random() * responses.length)];
      currentContact.messages.push({ mine:false, text:reply, time:'Maintenant' });
      currentContact.lastMsg = reply;
      renderMessages();
      renderList();
      scrollToBottom();
    }, 1500);
  }, 600);
}

function scrollToBottom() {
  setTimeout(() => {
    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;
  }, 50);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function toggleSend() {
  const val = document.getElementById('msgInput').value.trim();
  document.getElementById('sendBtn').disabled = !val;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

const emojis = ['😄','🏃','💪','🎾','⚽','🥾','🙌','🔥','👍','😊','🎉','💬'];
let emojiIdx = 0;
function addEmoji() {
  const input = document.getElementById('msgInput');
  input.value += emojis[emojiIdx % emojis.length];
  emojiIdx++;
  toggleSend();
  input.focus();
}

// Init
renderList();
</script>
</body>
</html>
